<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/sfro-logo.png" />
    <link rel="apple-touch-icon" href="/sfro-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0080A5" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!--
      Content Security Policy: restricts scripts/styles/connections to the
      current origin plus Vercel Analytics & Speed Insights endpoints. Inline
      styles are allowed for Tailwind's build output and the occasional style
      attribute emitted by Framer Motion. No inline scripts, no eval.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' https://va.vercel-scripts.com https://vitals.vercel-insights.com; worker-src 'self'; connect-src 'self' https://va.vercel-scripts.com https://vitals.vercel-insights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'"
    />
    <meta
      name="description"
      content="Radiosync — a reference tool to know when and how long to stop anticancer therapies before radiotherapy. By the SFRO."
    />
    <meta name="keywords" content="radiotherapy, chemotherapy, oncology, drug interactions, SFRO, radiation oncology" />

    <!-- OpenGraph (Facebook, LinkedIn, Slack, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Radiosync" />
    <meta property="og:title" content="Radiosync — Drug & Radiotherapy Explorer" />
    <meta property="og:description" content="Reference tool to know when and how long to stop anticancer therapies before radiotherapy." />
    <meta property="og:image" content="/sfro-logo.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Radiosync — Drug & Radiotherapy Explorer" />
    <meta name="twitter:description" content="Reference tool to know when and how long to stop anticancer therapies before radiotherapy." />
    <meta name="twitter:image" content="/sfro-logo.png" />

    <link rel="manifest" href="/manifest.json" />
    <title>Radiosync</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
